<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

   <!-- font and colors-->

 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Open+Sans&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Open Sans', sans-serif;
        }

 header h1 {
            font-family: 'Poppins', sans-serif;
        }

     .card:hover {
     transform: translateY(-5px);
       transition: 0.4s ease;
        }

.dark-mode {
    background-color: #121212;
    color: white;
}
    </style>
</head>

<body>

<header class="bg-primary bg-gradient text-white text-center py-5">
    <div class="container">
        <h1 class="display-4">cool portfolio</h1>
        <p class="lead">undergrade cs student</p>
        <h3 id="greeting-display" class="mt-3"></h3>
    </div>
</header>

<!-- navigation bar area--> 

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">

        <a class="navbar-brand" href="#">Portfolio</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">
              <li class="nav-item"><a class="nav-link" href="#summary">Summary</a></li>
          <li class="nav-item"><a class="nav-link" href="#education">Education</a></li>
          <li class="nav-item"><a class="nav-link" href="#experience">Projects</a></li>
                <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
              <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
<!--need to add a real downloadable here-->
            <a id="download-btn" href="resume.pdf" class="btn btn-primary ms-lg-3 mt-3 mt-lg-0" download>
                Download Resume
            </a>

            <button onclick="toggleTheme()" class="btn btn-outline-light ms-2">Toggle Theme</button>

        </div>

    </div>
</nav>

<!--adding skills area/ summary area-->

<main>

<section id="summary" class="py-5">
    <div class="container text-center">
        <h2 class="mb-4">Summary</h2>
        <p class="lead">I am a cybersecurity student with a semi functioning website B) </p>
    </div>
</section>

<section id="education" class="py-5 bg-light">
    <div class="container">

        <h2 class="text-center mb-4">Education</h2>

        <div id="education-table"></div>
        <div id="experience-table" class="mt-5"></div>

    </div>
</section>

<section id="experience" class="py-5">
    <div class="container">

        <h2 class="text-center mb-4">Projects</h2>

        <div class="row g-4" id="projects-container"></div>

    </div>
</section>

<section id="skills" class="py-5 bg-light">
    <div class="container">

        <h2 class="text-center mb-4">Skills</h2>

        <div class="row g-4 text-center" id="skills-list">

            <div class="col-md-3">
                <div class="card p-3 shadow-sm">HTML</div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 shadow-sm">CSS</div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 shadow-sm">C++</div>
            </div>

            <div class="col-md-3">
                <div class="card p-3 shadow-sm">Cybersecurity</div>
            </div>

        </div>

        <div class="mt-4 text-center">
            <input type="text" id="skill-input" placeholder="Enter a skill" class="form-control w-50 d-inline">
            <button onclick="addSkill()" class="btn btn-primary mt-2">Add Skill</button>
        </div>

    </div>
</section>

<p class="text-center mt-2">Downloads: <span id="download-count">0</span></p>

</main>

<script src="app.js"></script>

</body>
</html>
